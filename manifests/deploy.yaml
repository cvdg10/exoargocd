apiVersion: v1
kind: Namespace
metadata:
  name: exo1
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: exo1-react
  namespace: exo1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: exo1-react
  template:
    metadata:
      labels:
        app: exo1-react
    spec:
      containers:
        - name: exo1-react
          image: REGISTRY/exo1:TAG
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: exo1-react
  namespace: exo1
spec:
  selector:
    app: exo1-react
  ports:
    - port: 80
      targetPort: 80
  type: NodePort